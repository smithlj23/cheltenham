let currentSort = 'score';
let showTrends = true;
let showFactors = true;
let currentRace = 0;

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.controls button').forEach((b,i) => {
    if(i < 2) b.classList.toggle('active', (i===0 && s==='score') || (i===1 && s==='odds'));
  });
  renderRace();
}

function toggleTrends() {
  showTrends = !showTrends;
  document.querySelectorAll('.controls button')[2].classList.toggle('active', showTrends);
  renderRace();
}

function toggleFactors() {
  showFactors = !showFactors;
  document.querySelectorAll('.controls button')[3].classList.toggle('active', showFactors);
  renderRace();
}

function oddsToDecimal(o) {
  const p = o.split('/');
  return p.length === 2 ? (parseInt(p[0])/parseInt(p[1])) + 1 : parseFloat(o);
}

function renderNav() {
  const nav = document.getElementById('raceNav');
  nav.innerHTML = RACES.map((r,i) => 
    `<button class="${i===currentRace?'active':''}" onclick="selectRace(${i})">${r.id==='championhurdle'?'Champion Hurdle':r.id==='fredwinter'?'Fred Winter':r.id==='nhchase'?'NH Chase':r.name.split(' ').slice(-1)[0]}</button>`
  ).join('');
}

function selectRace(i) {
  currentRace = i;
  renderNav();
  renderRace();
  document.getElementById('raceContent').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderRace() {
  const race = RACES[currentRace];
  let horses = [...race.horses];
  
  if(currentSort === 'odds') {
    horses.sort((a,b) => oddsToDecimal(a.odds) - oddsToDecimal(b.odds));
  } else {
    horses.sort((a,b) => b.score - a.score);
  }

  const confClass = race.confidence;
  const confLabel = race.confidence.toUpperCase();

  let html = `
    <div class="race-header">
      <div class="race-num">${race.num}</div>
      <h2>${race.name} <span class="confidence ${confClass}">${confLabel}</span></h2>
      <div class="race-meta">${race.meta}</div>
      <div class="race-desc">${race.desc}</div>
    </div>
  `;

  if(showTrends) {
    html += `<div class="trends-panel"><h3>Key Trends</h3><ul>${race.trends.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }

  horses.forEach((h, idx) => {
    const rankClass = idx < 3 ? `top${idx+1}` : '';
    const rankNumClass = idx === 0 ? 'r1' : idx === 1 ? 'r2' : idx === 2 ? 'r3' : '';
    
    html += `
      <div class="horse-card ${rankClass}">
        <div class="horse-row">
          <div class="horse-rank ${rankNumClass}">${idx+1}</div>
          <div class="horse-info">
            <div class="horse-name">${h.name} ${h.nap ? '<span class="nap-badge">NAP</span>' : ''}</div>
            <div class="horse-details">${h.trainer} · ${h.jockey} · Form: ${h.form}${h.or !== '—' ? ` · OR: ${h.or}` : ''}</div>
          </div>
          <div class="horse-metrics">
            <span class="metric-pill score">${h.score}</span>
            <span class="metric-pill odds">${h.odds}</span>
            <span class="metric-pill gp ${h.gpClass}">${h.gp}</span>
          </div>
        </div>
        ${showFactors ? `
        <div class="horse-factors">
          ${(h.pros||[]).map(p => `<div class="factor pro"><span class="icon">✓</span> ${p}</div>`).join('')}
          ${(h.cons||[]).map(c => `<div class="factor con"><span class="icon">✗</span> ${c}</div>`).join('')}
        </div>` : ''}
      </div>
    `;
  });

  document.getElementById('raceContent').innerHTML = html;
}

// Init
renderNav();
document.querySelectorAll('.controls button')[2].classList.add('active');
document.querySelectorAll('.controls button')[3].classList.add('active');
renderRace();
</script>
