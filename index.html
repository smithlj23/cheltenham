let sort='score',show={trends:true,factors:true,verdicts:true},cur=0;
function setSort(s){sort=s;document.querySelectorAll('.ctrl button').forEach((b,i)=>{if(i<2)b.classList.toggle('on',(i===0&&s==='score')||(i===1&&s==='odds'))});render()}
function tog(k){show[k]=!show[k];const btns=document.querySelectorAll('.ctrl button');const map={trends:2,factors:3,verdicts:4};btns[map[k]].classList.toggle('on',show[k]);render()}
function oddsD(o){const p=o.split('/');return p.length===2?(parseInt(p[0])/parseInt(p[1]))+1:parseFloat(o)}
function nav(){document.getElementById('rnav').innerHTML=R.map((r,i)=>`<button class="${i===cur?'on':''}" onclick="sel(${i})">${r.id==='championhurdle'?'Ch. Hurdle':r.id==='fredwinter'?'Fred Winter':r.id==='nhchase'?'NH Chase':r.name.split(' ').pop()}</button>`).join('')}
function sel(i){cur=i;nav();render();document.getElementById('rc').scrollIntoView({behavior:'smooth',block:'start'})}
function render(){
const r=R[cur];let h=[...r.horses];
if(sort==='odds')h.sort((a,b)=>oddsD(a.odds)-oddsD(b.odds));else h.sort((a,b)=>b.score-a.score);
let o=`<div class="rh"><div class="rn">${r.num}</div><h2>${r.name}<span class="conf ${r.conf}">${r.conf.toUpperCase()}</span></h2><div class="rm">${r.meta}</div><div class="rd">${r.desc}</div></div>`;
o+=`<div class="picks-box"><div class="pick-card top"><div class="pick-label">🏆 Top Pick</div><div class="pick-horse">${r.topPick.name} <span style="color:var(--blue);font-size:.85rem">${r.topPick.odds}</span></div><div class="pick-why">${r.topPick.why}</div></div><div class="pick-card val"><div class="pick-label">💰 Value Pick</div><div class="pick-horse">${r.valuePick.name} <span style="color:var(--blue);font-size:.85rem">${r.valuePick.odds}</span></div><div class="pick-why">${r.valuePick.why}</div></div></div>`;
if(show.trends)o+=`<div class="tp"><h3>Key Trends</h3><ul>${r.trends.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
if(show.verdicts&&r.verdicts)o+=`<div class="vp"><h3>Professional Verdicts</h3>${r.verdicts.map(v=>`<div class="verdict">${v.text}</div><div class="src">${v.src}</div>`).join('')}</div>`;
h.forEach((x,i)=>{
const tc=i<3?`t${i+1}`:'';const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
o+=`<div class="hc ${tc}"><div class="hr"><div class="hrank ${rc}">${i+1}</div><div class="hi"><div class="hn">${x.name} ${x.nap?'<span class="nap">TOP PICK</span>':''} ${x.val?'<span class="val-badge">VALUE</span>':''}</div><div class="hd">${x.tr} · ${x.jk} · Form: ${x.form}${x.or!=='—'?` · OR: ${x.or}`:''}</div></div><div class="hm"><span class="mp sc">${x.score}</span><span class="mp od">${x.odds}</span><span class="mp gp ${x.gpc}">${x.gp}</span></div></div>`;
if(show.factors){
o+=`<div class="hx">`;
if(x.trForm||x.jkForm)o+=`<div class="hx-section"><div class="hx-title">Season Form & Record</div><div class="season-form">${x.trForm?`<strong>Trainer:</strong> ${x.trForm}<br>`:''} ${x.jkForm?`<strong>Jockey:</strong> ${x.jkForm}`:''}</div></div>`;
o+=`<div class="hx-section"><div class="hx-title">Factors</div><div class="hf">${(x.pros||[]).map(p=>`<div class="f pro"><span class="ic">✓</span>${p}</div>`).join('')}${(x.cons||[]).map(c=>`<div class="f con"><span class="ic">✗</span>${c}</div>`).join('')}</div></div>`;
if(x.verdict)o+=`<div class="verdict-summary"><strong>Verdict:</strong> ${x.verdict}</div>`;
o+=`</div>`;
}
o+=`</div>`;
});
document.getElementById('rc').innerHTML=o;
}
nav();render();
</script>
</body>
</html>
